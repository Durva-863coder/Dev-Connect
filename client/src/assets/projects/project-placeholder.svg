  <circle cx="550" cy="230" r="25" fill="#6366F1" opacity="0.8" />
  <path d="M 540 230 L 548 238 L 562 222" fill="none" stroke="#F8FAFC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
